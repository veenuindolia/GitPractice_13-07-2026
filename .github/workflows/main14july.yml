name: RG creation 14 July

on:
  workflow_dispatch:
  
permissions:
  id-token: write
  contents: read

jobs:
  Create_RG:
    name: Learning Github actions
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
       
      - name: Terraform init
        run: terraform init

      - name: Plan
        run: terraform plan

      - name: Apply
        run: terraform apply -auto-approve
    

       

    
