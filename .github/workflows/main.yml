name: RG Creation by Github actions

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read  

jobs:
  RGCreate:
    name: Creating a RG
    runs-on: ubuntu-latest

  Steps:
    - name: azure login
    uses: azure/login@v3
    with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
